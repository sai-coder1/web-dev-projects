<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>color flipper </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
       
        body{

            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;

            background-image: url(color.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

        }
         h2{
            font-size: 5rem;
            margin:20px 0;
        }
        button{
            transition:transform 0.2s ;
        }
        button:hover{
            transform: scale(1.05);
            box-shadow:0 0 10px white;
        }
        .buttons{
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        #overlay{
            position:fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content:center;
            align-items: center;
            background: rgba(255,255,255,0.3);
            transition: background-color 0.5s;
        }

        .btn{
            padding: 12px 30px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>Color Flipper</h2>
        <div class="buttons">

            <button type="button" class="btn btn-success" onclick="setColor('green')">Green</button>
            <button type="button" class="btn btn-danger" onclick="setColor('red')">Red</button>
            <button type="button" class="btn btn-warning" onclick="setColor('orange')">Orange</button>
            <button type="button" class="btn btn-info" onclick="setColor('lightblue')">Blue</button>
            <button type="button" class="btn btn-dark" onclick="randomColor()">Random</button>
        
        </div>
    </div>
    <script src="index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
